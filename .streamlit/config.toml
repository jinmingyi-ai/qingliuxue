[theme]
base = "light"
primaryColor = "#b94f3b"
backgroundColor = "#fff8f5"
secondaryBackgroundColor = "#fbebe6"
textColor = "#2b2724"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
